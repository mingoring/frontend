# ---------------------------------------------------------------- #
# AI 기본 설정 (언어 및 페르소나)
# ---------------------------------------------------------------- #

# AI가 응답할 때 사용할 기본 언어를 설정합니다.
language: ko-KR

# ---------------------------------------------------------------- #
# 코드 리뷰 기능 세부 설정
# ---------------------------------------------------------------- #
reviews:
  # 리뷰의 전반적인 스타일을 설정합니다. 'chill'은 비교적 덜 엄격하고 부드러운 톤을 의미합니다.
  profile: chill

  # CodeRabbit의 코멘트를 모두 `resolve`하면, 자동으로 Approve를 하는 기능입니다.
  request_changes_workflow: false

  # PR의 전체적인 변경 사항에 대한 고수준의 요약(summary)을 생성할지 여부입니다.
  high_level_summary: true

  # 변경된 각 파일에 대한 요약을 생성할지 여부입니다.
  # PR이 너무 길어지는 것을 방지하기 위해 비활성화했습니다.
  changed_files_summary: false

  # 코드의 실행 흐름을 보여주는 시퀀스 다이어그램을 생성할지 여부입니다.
  sequence_diagrams: true

  # PR에 연결된 이슈(Issue)를 분석하여 리뷰 컨텍스트에 활용할지 여부입니다.
  assess_linked_issues: true

  # 연관된 다른 이슈를 찾아서 링크할지 여부입니다.
  related_issues: false

  # 연관된 다른 PR을 찾아서 링크할지 여부입니다.
  related_prs: false

  # PR에 적절한 레이블(e.g., 'bug', 'enhancement', 'ui', 'state-management')을 제안할지 여부입니다.
  suggested_labels: false

  # 제안된 레이블을 자동으로 PR에 적용할지 여부입니다.
  auto_apply_labels: false

  # 이 PR을 리뷰할 만한 적절한 동료 리뷰어를 추천할지 여부입니다.
  suggested_reviewers: false

  # 추천된 리뷰어를 자동으로 할당할지 여부입니다.
  auto_assign_reviewers: false

  # 리뷰 요약에 위트 있는 시(poem)를 포함할지 여부입니다.
  poem: false

# 특정 파일 경로에 따라 다른 리뷰 지침을 적용합니다.
  path_instructions:
    - path: "lib/**"
      instructions: |
        1. CLAUDE.md에 정의된 팀 컨벤션, Feature-First 아키텍처 원칙, Riverpod 상태 관리 패턴을 기준으로 리뷰해주세요.
        2. 계층 분리(dto/models/repositories/providers/screens), Widget 재사용성, const 사용, 에러 처리(AppException)를 확인해주세요.
        3. 각 리뷰 포인트별로 문제점과 대안을 논리적으로 제시하고, 개선된 Dart/Flutter 예시 코드를 추가해 주세요.
        
    - path: "**/screens/**"
      instructions: |
        1. Widget 구조와 core/widgets 의 재사용성을 중점적으로 리뷰해주세요.
        2. const 생성자가 적절히 사용되었는지, 불필요한 rebuild가 발생하지 않는지 확인해주세요.
        3. 화면(UI) 로직만 포함되어 있는지 검토하세요. 비즈니스 로직이나 API 호출이 화면에 직접 구현되어 있다면 providers로 분리하도록 제안하세요.
        4. 상태 구독 시 ref.watch()의 범위가 적절한지 검토해주세요.

    - path: "**/providers/**"
      instructions: |
        1. Riverpod 2.0+ 패턴(Notifier, AsyncNotifier 등)이 올바르게 사용되었는지 확인해주세요.
        2. 상태 관리에 있어 불변성(immutability)이 유지되는지 검토해주세요.
        3. 비동기 데이터 로딩 시 AsyncValue(data, loading, error) 패턴을 명확히 활용하고 있는지 확인하세요.
        4. 데이터 원본(dto)이 아닌 변환된 앱 모델(models)을 상태로 관리하고 있는지 확인해주세요.
        
    - path: "**/repositories/**"
      instructions: |
        1. 서버 통신용 데이터(dto)를 앱 내부 비즈니스 로직용 데이터(models)로 올바르게 변환(Mapping)하고 있는지 확인하세요.
        2. Repository 구현체가 Data 접근 기능만 수행하며 UI나 상태 관리(Provider) 객체를 알지 못하게 철저히 분리되었는지 검토해주세요.
        3. API 에러나 파싱 에러를 core/errors 에 정의된 AppException으로 적절히 던지고(throw) 있는지 확인하세요.

    - path: "**/models/**"
      instructions: |
        1. 앱 내부에서 사용하는 순수한 비즈니스 모델인지 확인하세요. (API 통신에만 쓰이는 필드가 섞여 있다면 dto로 분리하도록 제안하세요.)
        2. freezed 와 json_serializable(필요 시)이 올바르게 설정되었는지 확인해주세요.

    - path: "**/dto/**"
      instructions: |
        1. API 요청/응답 형식과 정확히 일치하는지, 직렬화/역직렬화(fromJson, toJson) 로직이 잘 구성되었는지 확인하세요.

    - path: "lib/core/**"
      instructions: |
        1. 공통 인프라(router, theme, network, storage 등) 코드가 특정 Feature 비즈니스 로직에 의존하지 않는지 엄격하게 검토해주세요.
        2. Extension 메서드, 공통 Utils, Constants의 네이밍이 명확하고 범용적으로 재사용 가능한지 확인해주세요.        

  # ---------------------------------------------------------------- #
  # 자동 리뷰 트리거 설정
  # CodeRabbit이 언제 코드 리뷰를 시작할지에 대한 설정입니다.
  # ---------------------------------------------------------------- #
  auto_review:
    # Pull Request(PR)가 새로 생성되면 main, dev 브랜치에 한해 자동으로 코드 리뷰가 시작됩니다.
    enabled: true
    base_branches:
      - main
      - dev

    # 이미 리뷰가 진행된 PR에 새로운 코드가 추가(push)되어도 자동으로 그 변경분에 대해 추가 리뷰를 하지 않습니다.
    # 새로운 변경점에 대한 리뷰가 필요하면, 다시 @coderabbitai review를 호출해야 합니다.
    # 개발자가 코드를 수정하는 중간 과정마다 AI가 계속해서 코멘트를 다는 것을 방지하여, 원하는 시점에 전체적인 피드백을 받을 수 있게 하기 위함입니다.
    auto_incremental_review: false

# ---------------------------------------------------------------- #
# 채팅 기능 설정
# PR 내에서 CodeRabbit과 대화하는 방식에 대한 설정입니다.
# ---------------------------------------------------------------- #
chat:
  # 사용자가 PR 코멘트에서 @coderabbitai라고 직접 AI를 호출(태그)하지 않아도, AI가 대화의 맥락을 파악하고 자동으로 답변할 수 있습니다.
  auto_reply: true

# ---------------------------------------------------------------- #
# CodeRabbit의 지식 기반(Knowledge Base) 설정
# CodeRabbit이 무엇을 근거로 리뷰하고 답변할지, 즉 AI의 '뇌'에 어떤 정보를 넣어줄지 설정하는 가장 중요한 부분입니다.
# ---------------------------------------------------------------- #
knowledge_base:

  # 웹 검색을 통해 최신 정보나 문서를 참조할 수 있도록 허용할지 여부입니다.
  # AI가 리뷰나 질문에 답변할 때, 웹 검색을 통해 Flutter/Dart 최신 정보나 공식 문서를 참조할 수 있습니다.
  web_search:
    enabled: true

  # AI가 코드 리뷰를 할 때, 이 프로젝트만의 코드 컨벤션과 가이드라인을 기준으로 삼습니다.
  # filePatterns 을 통해, 어떤 파일을 컨벤션 문서로 사용할지 지정합니다.
  code_guidelines:
    enabled: true
    filePatterns:
      - CLAUDE.md

  # CodeRabbit이 대화나 리뷰를 통해 학습한 내용을 어디에 저장하고 참조할지 범위를 설정합니다.
  # 'local'은 현재 이 레포지토리에만 한정됨을 의미합니다.
  learnings:
    scope: local

  # 이슈 정보를 참조할 범위를 설정합니다.
  # 'local'은 현재 이 레포지토리에만 한정됨을 의미합니다.
  issues:
    scope: local

  # 풀 리퀘스트 정보를 참조할 범위를 설정합니다.
  # 'local'은 현재 이 레포지토리에만 한정됨을 의미합니다.
  pull_requests:
    scope: local
